<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>DocuScan Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    [data-theme="dark"] {
      --bg: #0e0b0b; --bg2: #140f0f; --card: #1a1212; --card2: #221818;
      --border: #3a2020; --border2: #2a1818; --accent: #ff3b3b; --accent2: #ff6b35;
      --accent-glow: rgba(255, 59, 59, 0.2); --text: #f5eded; --text2: #c9a8a8;
      --muted: #7a5555; --success: #4ade80; --success-bg: #0f2a1a;
      --warning-bg: #2a2010; --warning-text: #e0c060; --warning-bdr: #5a4a20;
      --error-bg: #2a1010; --error-text: #ff6b6b; --error-bdr: #5a2020;
      --scan-btn: linear-gradient(135deg, #ff3b3b, #ff6b35); --header-bg: #1a1212;
    }
    [data-theme="light"] {
      --bg: #fdf6f6; --bg2: #f5eeee; --card: #ffffff; --card2: #fdf0f0;
      --border: #e8d0d0; --border2: #f0e0e0; --accent: #e02020; --accent2: #f05030;
      --accent-glow: rgba(224, 32, 32, 0.12); --text: #1a0a0a; --text2: #5a3030;
      --muted: #9a7070; --success: #16a34a; --success-bg: #f0fdf4;
      --warning-bg: #fffbeb; --warning-text: #92400e; --warning-bdr: #fcd34d;
      --error-bg: #fef2f2; --error-text: #dc2626; --error-bdr: #fca5a5;
      --scan-btn: linear-gradient(135deg, #e02020, #f05030); --header-bg: #ffffff;
    }
    body {
      font-family: 'Space Grotesk', sans-serif; background: var(--bg);
      color: var(--text); min-height: 100vh; display: flex;
      flex-direction: column; align-items: center; transition: background 0.3s;
    }
    header {
      width: 100%; padding: 16px 24px; background: var(--header-bg);
      border-bottom: 1px solid var(--border); display: grid;
      grid-template-columns: 1fr auto 1fr; align-items: center;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; justify-content: center; }
    .logo-icon {
      width: 38px; height: 38px; background: var(--scan-btn); border-radius: 11px;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .logo-text h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.4px; }
    .logo-text h1 span { color: var(--accent); }
    .logo-text p { font-size: 0.65rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .theme-toggle {
      justify-self: end; display: flex; align-items: center; gap: 7px;
      background: var(--card2); border: 1px solid var(--border); border-radius: 50px;
      padding: 7px 14px; cursor: pointer; font-size: 0.8rem; color: var(--text2);
    }
    .container { width: 100%; max-width: 500px; padding: 24px 16px 60px; display: flex; flex-direction: column; gap: 20px; }
    
    .upload-zone {
      background: var(--card); border: 2px dashed var(--border); border-radius: 22px;
      padding: 40px 24px; text-align: center; cursor: pointer; position: relative;
    }
    .upload-zone:hover { border-color: var(--accent); border-style: solid; }
    .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; z-index: 2; }
    .upload-icon-wrap {
      width: 64px; height: 64px; background: var(--scan-btn); border-radius: 20px;
      display: flex; align-items: center; justify-content: center; font-size: 1.8rem;
      margin: 0 auto 16px; box-shadow: 0 10px 30px var(--accent-glow);
    }
    .mode-bar { display: none; background: var(--card2); border: 1px solid var(--border); padding: 6px; border-radius: 14px; display: flex; gap: 5px; margin-top: 20px; }
    .mode-toggle-btn { flex: 1; padding: 10px; border-radius: 10px; border: none; background: transparent; color: var(--muted); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .mode-toggle-btn.active { background: var(--card); color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    .preview-grid { display: none; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; background: var(--card2); padding: 15px; border-radius: 18px; border: 1px solid var(--border); margin-top: 20px; }
    .preview-item { position: relative; aspect-ratio: 3/4; border-radius: 10px; overflow: hidden; border: 1px solid var(--border2); }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-count { font-size: 0.75rem; color: var(--muted); text-align: center; font-family: 'JetBrains Mono', monospace; margin-top: 8px; }

    .scan-btn {
      display: none; width: 100%; padding: 18px; background: var(--scan-btn);
      color: #fff; border: none; border-radius: 16px; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 8px 28px var(--accent-glow); transition: all 0.2s;
    }
    .scan-btn.processing { opacity: 0.7; cursor: not-allowed; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(0.98)} 100%{transform:scale(1)} }

    .loader { display: none; flex-direction: column; align-items: center; gap: 15px; padding: 20px; text-align: center; }
    .spinner { width: 40px; height: 40px; border: 4px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-section { display: none; flex-direction: column; gap: 16px; }
    .result-card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
    .result-header { padding: 12px 16px; background: var(--success-bg); color: var(--success); font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
    .result-card img { width: 100%; max-height: 400px; object-fit: contain; background: #fff; display: block; }
    
    .download-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
    .dl-btn {
      padding: 12px; border-radius: 10px; text-decoration: none; font-size: 0.85rem; font-weight: 600;
      text-align: center; color: var(--text); background: var(--card2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s;
    }
    .dl-btn:hover { border-color: var(--accent); color: var(--accent); }
    .dl-pdf { background: var(--scan-btn); color: #fff; border: none; }
    .dl-pdf:hover { transform: translateY(-1px); opacity: 0.9; color: #fff; }

    .nav-buttons { display: flex; gap: 10px; margin-top: 10px; }
    .nav-btn { flex: 1; padding: 14px; background: var(--card); color: var(--text2); border: 1px solid var(--border); border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

    .history-section { margin-top: 40px; display: flex; flex-direction: column; gap: 12px; }
    .history-title { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-family: 'JetBrains Mono', monospace; }
    .history-list { display: flex; flex-direction: column; gap: 8px; }
    .history-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
    .history-item:hover { border-color: var(--accent); }
    .history-thumb { width: 40px; height: 52px; background: #222; border-radius: 4px; overflow: hidden; }
    .history-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .history-info { flex: 1; }
    .history-info strong { font-size: 0.85rem; display: block; }
    .history-info span { font-size: 0.7rem; color: var(--muted); }
    .history-dl { color: var(--accent); }
    .error-box { display: none; background: var(--error-bg); color: var(--error-text); padding: 12px; border-radius: 10px; font-size: 0.85rem; text-align: center; }
  </style>
</head>
<body>
<header>
  <div></div>
  <div class="logo">
    <div class="logo-icon">📄</div>
    <div class="logo-text"><h1>Docu<span>Scan</span> Pro</h1><p>multi-page scanner</p></div>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()"><span id="theme-icon">🌙</span></button>
</header>
<div class="container">
  <div id="upload-view">
    <div class="upload-zone" id="upload-zone">
      <input type="file" id="file-input" accept="image/*" multiple capture="environment"/>
      <div class="upload-icon-wrap">📸</div>
      <h2>Select Photos</h2>
      <p style="font-size: 0.75rem; color: var(--muted); margin-top: 5px;">B&W or Color Multi-Page PDF</p>
    </div>
    <div id="mode-bar" class="mode-bar" style="display: none;">
      <button id="mode-bw" class="mode-toggle-btn active" onclick="setMode('bw')">📄 B&W</button>
      <button id="mode-color" class="mode-toggle-btn" onclick="setMode('color')">🎨 Color</button>
    </div>
    <div id="preview-grid" class="preview-grid"></div>
    <p id="preview-count" class="preview-count" style="display: none;"></p>
    <button class="scan-btn" id="scan-btn" onclick="scanDocuments()" style="margin-top: 20px;">✨ Create Document</button>
    <div class="loader" id="loader"><div class="spinner"></div><p>Converting & merging...</p></div>
    <div class="error-box" id="error-box" style="margin-top: 15px;"></div>
  </div>
  <div class="result-section" id="result-section">
    <div class="result-card">
      <div class="result-header">
        <span>✅ Scan Ready</span>
        <span id="page-badge" style="background: var(--accent); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.65rem;"></span>
      </div>
      <img id="result-img" src=""/>
      <div class="download-row">
        <a id="dl-pdf" href="#" class="dl-btn dl-pdf" download>💾 Download PDF</a>
        <a id="preview-pdf" href="#" target="_blank" class="dl-btn">👁️ Preview Document</a>
      </div>
    </div>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="goHome()">← Go Back</button>
    </div>
  </div>
  <div class="history-section" id="history-section" style="display: none;">
    <div class="history-title">Recent Scans</div>
    <div class="history-list" id="history-list"></div>
  </div>
</div>
<script>
  let selectedFiles = [];
  let scanHistory = [];
  let selectedMode = 'bw';
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute("data-theme") === "dark";
    html.setAttribute("data-theme", isDark ? "light" : "dark");
    document.getElementById("theme-icon").textContent = isDark ? "☀️" : "🌙";
  }
  function setMode(mode) {
    selectedMode = mode;
    document.getElementById('mode-bw').classList.toggle('active', mode === 'bw');
    document.getElementById('mode-color').classList.toggle('active', mode === 'color');
  }
  document.getElementById("file-input").addEventListener("change", function() {
    selectedFiles = Array.from(this.files);
    if (selectedFiles.length === 0) return;
    const grid = document.getElementById("preview-grid");
    grid.innerHTML = ""; grid.style.display = "grid";
    document.getElementById("mode-bar").style.display = "flex";
    selectedFiles.forEach(file => {
      const reader = new FileReader();
      const item = document.createElement("div");
      item.className = "preview-item";
      reader.onload = e => { item.innerHTML = `<img src="${e.target.result}"/>`; };
      reader.readAsDataURL(file);
      grid.appendChild(item);
    });
    document.getElementById("preview-count").textContent = `${selectedFiles.length} page(s) selected`;
    document.getElementById("preview-count").style.display = "block";
    document.getElementById("scan-btn").style.display = "block";
    document.getElementById("error-box").style.display = "none";
  });
  async function scanDocuments() {
    if (selectedFiles.length === 0) return;
    const btn = document.getElementById("scan-btn");
    btn.classList.add("processing"); btn.disabled = true;
    document.getElementById("loader").style.display = "flex";
    document.getElementById("error-box").style.display = "none";
    const form = new FormData();
    selectedFiles.forEach(file => form.append("images", file));
    form.append("mode", selectedMode);
    try {
      const res = await fetch("/scan", { method: "POST", body: form });
      const json = await res.json();
      btn.classList.remove("processing"); btn.disabled = false;
      document.getElementById("loader").style.display = "none";
      if (json.error) { showError(json.error); return; }
      document.getElementById("result-img").src = json.formats.png + "?t=" + Date.now();
      document.getElementById("dl-pdf").href = json.formats.pdf;
      document.getElementById("dl-pdf").download = `Scan_${new Date().toISOString().slice(0,10)}.pdf`;
      document.getElementById("preview-pdf").href = json.formats.pdf;
      document.getElementById("page-badge").textContent = `${json.page_count} Pages`;
      document.getElementById("upload-view").style.display = "none";
      document.getElementById("result-section").style.display = "flex";
      addToHistory(json);
    } catch (err) {
      btn.classList.remove("processing"); btn.disabled = false;
      document.getElementById("loader").style.display = "none";
      showError("Connection Error");
    }
  }
  function addToHistory(scan) {
    scanHistory.unshift({
      id: scan.id, thumb: scan.formats.png, pdf: scan.formats.pdf,
      pages: scan.page_count, mode: selectedMode,
      time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
    });
    renderHistory();
  }
  function renderHistory() {
    const list = document.getElementById("history-list");
    list.innerHTML = "";
    if (scanHistory.length === 0) { document.getElementById("history-section").style.display = "none"; return; }
    document.getElementById("history-section").style.display = "flex";
    scanHistory.forEach(item => {
      const div = document.createElement("div");
      div.className = "history-item";
      div.onclick = () => window.open(item.pdf, '_blank');
      div.innerHTML = `
        <div class="history-thumb"><img src="${item.thumb}"/></div>
        <div class="history-info">
          <strong>Doc ${item.id.slice(0,6)} (${item.mode.toUpperCase()})</strong>
          <span>${item.pages} pages • ${item.time}</span>
        </div>
        <div class="history-dl">⬇</div>
      `;
      list.appendChild(div);
    });
  }
  function goHome() {
    selectedFiles = [];
    document.getElementById("file-input").value = "";
    document.getElementById("preview-grid").style.display = "none";
    document.getElementById("preview-count").style.display = "none";
    document.getElementById("mode-bar").style.display = "none";
    document.getElementById("scan-btn").style.display = "none";
    document.getElementById("upload-view").style.display = "block";
    document.getElementById("result-section").style.display = "none";
    document.getElementById("error-box").style.display = "none";
  }
  function showError(m) {
    const eb = document.getElementById("error-box");
    eb.textContent = m; eb.style.display = "block";
  }
</script>
</body>
</html>
